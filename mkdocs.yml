site_name: axum_asgi_bridge
site_description: Embed high-performance Axum services into Python ASGI hosts
repo_name: stac-utils/axum_asgi_bridge
repo_url: https://github.com/stac-utils/axum_asgi_bridge

theme:
  name: material
  features:
    - content.code.copy
    - navigation.instant
    - navigation.sections
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - API Reference: api.md
  - Performance: performance.md
  - Middleware: middleware.md
  - Observability: observability.md
  - Roadmap: roadmap.md
  - CI and Release: ci_release.md
